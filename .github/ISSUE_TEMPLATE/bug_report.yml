name: Bug report
description: Report a reproducible problem
body:
  - type: markdown
    attributes:
      value: Do not include API keys, private source code, or security vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.3.0-beta.1
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
