name: Build Windows beta release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.3.0-beta.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/ui/package-lock.json
      - run: python -m venv .venv
      - run: .venv\Scripts\python -m pip install --upgrade pip
      - run: .venv\Scripts\python -m pip install -r requirements.txt -r requirements-build.txt
      - run: npm ci
        working-directory: web/ui
      - run: packaging\build.ps1
      - run: node packaging\smoke.mjs
      - run: Compress-Archive -Path dist\ImeceIDE\* -DestinationPath ImeceIDE-windows.zip
      - run: (Get-FileHash ImeceIDE-windows.zip -Algorithm SHA256).Hash + '  ImeceIDE-windows.zip' | Out-File -Encoding ascii SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: ImeceIDE-windows
          path: |
            ImeceIDE-windows.zip
            SHA256SUMS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" ImeceIDE-windows.zip SHA256SUMS.txt --target "${{ github.sha }}" --prerelease --title "${{ inputs.tag }}" --notes "Windows public beta. This package is unsigned; Windows SmartScreen may show a warning. Verify SHA256SUMS.txt before use."
